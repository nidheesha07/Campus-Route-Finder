<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Campus Route Finder - Login</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="page-center">
        <div class="card">
            <div class="app-header">
                <span class="app-icon">🎓</span>
                <h1>Campus Route Finder</h1>
                <p class="tagline">Find your way around campus, the smart way.</p>
            </div>

            {% if error %}
                <p class="error-message">{{ error }}</p>
            {% endif %}

            <form method="POST" action="{{ url_for('login') }}">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" placeholder="Enter any username">

                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Enter any password">

                <button type="submit" class="primary-button">Log In</button>
            </form>

            <p class="hint-text">This is a demo login. Any username and password will work.</p>
        </div>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
